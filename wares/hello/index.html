<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Title appears in the browser tab when the ware is open.
      Keep it short — Bazaar prepends the ware name automatically.
    -->
    <title>Hello</title>
  </head>
  <body>
    <div id="root"></div>
    <!--
      Vite replaces this script tag with hashed asset URLs during `npm run build`.
      The path must be absolute (leading slash) — Vite rewrites it; the browser
      never fetches this exact URL.
    -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

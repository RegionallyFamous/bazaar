<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="#140820"/>
  <!-- 5 color circles arranged in a quincunx: 3 on top row, 2 on bottom centered -->
  <!-- Top row -->
  <circle cx="16" cy="26" r="10" fill="#ef4444"/>
  <circle cx="32" cy="26" r="10" fill="#f59e0b"/>
  <circle cx="48" cy="26" r="10" fill="#4ade80"/>
  <!-- Bottom row (centered between top circles) -->
  <circle cx="24" cy="44" r="10" fill="#3b82f6"/>
  <circle cx="40" cy="44" r="10" fill="#a855f7"/>
  <!-- Highlight gloss on each circle -->
  <circle cx="13" cy="22.5" r="3.5" fill="white" opacity="0.22"/>
  <circle cx="29" cy="22.5" r="3.5" fill="white" opacity="0.22"/>
  <circle cx="45" cy="22.5" r="3.5" fill="white" opacity="0.22"/>
  <circle cx="21" cy="40.5" r="3.5" fill="white" opacity="0.22"/>
  <circle cx="37" cy="40.5" r="3.5" fill="white" opacity="0.22"/>
</svg>

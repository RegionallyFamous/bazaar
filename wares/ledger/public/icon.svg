<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="#0a1f14"/>
  <!-- Receipt body -->
  <rect x="13" y="8" width="38" height="46" rx="3" fill="#122b1c"/>
  <!-- Torn serrated bottom edge -->
  <path d="M13 44 Q16 48.5 19 44 Q22 48.5 25 44 Q28 48.5 31 44 Q34 48.5 37 44 Q40 48.5 43 44 Q46 48.5 49 44 L51 54 L13 54 Z" fill="#0a1f14"/>
  <!-- Invoice header -->
  <rect x="18" y="14" width="28" height="2.5" rx="1.25" fill="#4ade80" opacity="0.9"/>
  <!-- Line items: label + amount columns -->
  <rect x="18" y="21" width="17" height="2" rx="1" fill="#22c55e" opacity="0.7"/>
  <rect x="39" y="21" width="9"  height="2" rx="1" fill="#4ade80" opacity="0.7"/>
  <rect x="18" y="26" width="19" height="2" rx="1" fill="#22c55e" opacity="0.6"/>
  <rect x="39" y="26" width="9"  height="2" rx="1" fill="#4ade80" opacity="0.6"/>
  <rect x="18" y="31" width="15" height="2" rx="1" fill="#22c55e" opacity="0.5"/>
  <rect x="39" y="31" width="9"  height="2" rx="1" fill="#4ade80" opacity="0.5"/>
  <!-- Dashed divider -->
  <line x1="18" y1="36" x2="48" y2="36" stroke="#4ade80" stroke-width="1" stroke-dasharray="2.5 2" stroke-linecap="round" opacity="0.4"/>
  <!-- Total row -->
  <rect x="18" y="40" width="10" height="2" rx="1" fill="#4ade80" opacity="0.5"/>
  <rect x="38" y="40" width="10" height="2.5" rx="1.25" fill="#4ade80"/>
</svg>

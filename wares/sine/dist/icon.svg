<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="#08091e"/>
  <!-- Oscilloscope screen bezel -->
  <rect x="7" y="12" width="50" height="34" rx="5" fill="#0d1136"/>
  <!-- Screen inner glow area -->
  <rect x="9" y="14" width="46" height="30" rx="3" fill="#0f1540"/>
  <!-- Grid lines  horizontal -->
  <line x1="9"  y1="29" x2="55" y2="29" stroke="#1a2160" stroke-width="1"/>
  <!-- Grid lines  vertical -->
  <line x1="32" y1="14" x2="32" y2="44" stroke="#1a2160" stroke-width="1"/>
  <line x1="20" y1="14" x2="20" y2="44" stroke="#1a2160" stroke-width="0.5" opacity="0.5"/>
  <line x1="44" y1="14" x2="44" y2="44" stroke="#1a2160" stroke-width="0.5" opacity="0.5"/>
  <!-- Sine wave  main line -->
  <path d="M9 29 C13 29 15 17 20 17 C25 17 27 41 32 41 C37 41 39 17 44 17 C49 17 51 29 55 29"
    stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Subtle glow duplicate -->
  <path d="M9 29 C13 29 15 17 20 17 C25 17 27 41 32 41 C37 41 39 17 44 17 C49 17 51 29 55 29"
    stroke="#c4b5fd" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.08"/>
  <!-- Three knobs below the screen -->
  <circle cx="18" cy="54" r="5" fill="#13184d"/>
  <circle cx="32" cy="54" r="5" fill="#13184d"/>
  <circle cx="46" cy="54" r="5" fill="#13184d"/>
  <circle cx="18" cy="54" r="2" fill="#4338ca"/>
  <circle cx="32" cy="54" r="2" fill="#6d28d9"/>
  <circle cx="46" cy="54" r="2" fill="#4338ca"/>
</svg>

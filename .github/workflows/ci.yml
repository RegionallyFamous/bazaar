name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ---------------------------------------------------------------------------
  # PHP — lint + test across PHP 8.1 / 8.2 / 8.3
  # ---------------------------------------------------------------------------
  php:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.2', '8.3', '8.4' ]

    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: zip, mbstring
          coverage: none
          ini-values: memory_limit=1G

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-php${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-php${{ matrix.php }}-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHPCS lint
        run: composer phpcs

      - name: PHPStan analyse
        run: composer phpstan

      - name: PHPUnit tests
        run: composer test

  # ---------------------------------------------------------------------------
  # Release zip — built on every push to main, uploaded on tagged releases
  # ---------------------------------------------------------------------------
  release-zip:
    name: Release zip
    runs-on: ubuntu-latest
    needs: [ php, js ]

    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: zip, mbstring
          coverage: none

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build release zip
        run: bash bin/build-zip.sh

      - name: Verify autoloader is present
        run: |
          unzip -l dist/bazaar-*.zip | grep vendor/autoload.php
          echo "✓ vendor/autoload.php present in zip"

      - name: Verify no dev packages in zip
        run: |
          if unzip -l dist/bazaar-*.zip | grep -q 'vendor/phpunit\|vendor/phpstan\|vendor/squizlabs\|vendor/brain'; then
            echo "ERROR: dev packages found in zip" >&2
            exit 1
          fi
          echo "✓ No dev packages in zip"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: bazaar-zip
          path: dist/bazaar-*.zip

      - name: Attach zip to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/bazaar-*.zip --clobber

  # ---------------------------------------------------------------------------
  # JS — lint + build + test (Node 24)
  # ---------------------------------------------------------------------------
  js:
    name: JS / Node 24
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: JS lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: JS tests
        run: npm test
